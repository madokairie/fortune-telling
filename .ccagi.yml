# Fortune Telling - 紫微斗数活用パーソナルアプリ
# Generated by CCAGI SDK v3.13.0

project:
  name: fortune-telling
  description: "紫微斗数・方位術・東洋占術の知見をAIで活用する個人専用アプリ"
  version: "0.1.0"
  language: ja

# ドメイン設定
domain:
  dev_subdomain: fortune-telling-dev.aidreams-factory.com
  prod_subdomain: fortune-telling.aidreams-factory.com

# 技術スタック
tech_stack:
  framework: next.js
  language: typescript
  styling: tailwind
  ui_library: shadcn/ui
  ai: claude-api
  pwa: true
  auth: none

# AI設定
ai:
  provider: anthropic
  model: claude-sonnet-4-6
  knowledge:
    system_prompt: "命盤データ、基本性質、紫微斗数理論要約"
    rag: "プロ鑑定文字起こし、鑑定書類、年間吉方位データ"

# Coordinator Agent設定
coordinator_agent:
  max_parallel_tasks: 3

# コマンド設定
commands:
  generate-requirements:
    output_dir: docs/requirements
    analysis_depth: thorough
    language: ja
