# ============================================================
# Fortune Telling - Design System
# ============================================================
# Generated by CCAGI SDK v3.13.0 | Phase 2: Design System
# Date: 2026-03-08
# ============================================================

version: "1.0.0"
generated_at: "2026-03-08"
source: "docs/requirements/design-requirements.md"

# ------------------------------------------------------------
# 美的方向性
# ------------------------------------------------------------
aesthetic:
  direction: luxury-oriental
  mood: "洗練された静寂、深い知性、神秘的な品格"
  tone: "高級和モダン — 京都の高級旅館のような静謐さと、宇宙の神秘を感じさせる"
  differentiation: "占いアプリの安っぽさを完全に排除。経営者が毎日開くに値する品格と知性を持つUI"
  keywords:
    - 静謐
    - 深淵
    - 品格
    - 知的
    - 東洋的神秘
    - モダンラグジュアリー
  references:
    - "高級和食店のWebサイト — 余白の美、タイポグラフィの品格"
    - "天文台・プラネタリウム — 星図モチーフ、宇宙的な広がり"
    - "ハイブランドのミニマルサイト — 洗練されたインタラクション"
    - "書道・墨絵 — 東洋的な筆致のアクセント"

# ------------------------------------------------------------
# カラーシステム
# ------------------------------------------------------------
colors:
  # ダークモードをデフォルトとする
  default_mode: dark

  # ブランドカラー
  brand:
    deep_indigo: "#1a1432"      # メイン背景（ダーク）
    midnight: "#0d0b14"          # 最深部背景
    warm_ivory: "#f5f0e8"        # ライトモード背景
    soft_gold: "#c9a96e"         # プライマリアクセント（金運・吉）
    crimson: "#8b3a3a"           # 注意・凶のインジケーター
    jade: "#5a7a6a"              # 吉のインジケーター・健康
    silver_mist: "#b8b0c8"       # セカンダリテキスト
    pearl: "#e8e2d8"             # カード背景・テキスト
    ink: "#2a2438"               # テキスト（ダーク背景上）

  # セマンティックカラー（ダークモード）
  dark:
    background:
      primary: "#1a1432"         # Deep Indigo
      secondary: "#0d0b14"       # Midnight
      card: "#1f1a2e"
      elevated: "#251f3a"
    text:
      primary: "#e8e2d8"         # Pearl
      secondary: "#b8b0c8"       # Silver Mist
      muted: "#7a7490"
      accent: "#c9a96e"          # Soft Gold
    border:
      default: "#2a2440"
      subtle: "#201a35"
      accent: "#c9a96e"
    accent:
      positive: "#c9a96e"        # Soft Gold — 吉
      negative: "#8b3a3a"        # Crimson — 凶
      health: "#5a7a6a"          # Jade — 健康

  # セマンティックカラー（ライトモード）
  light:
    background:
      primary: "#f5f0e8"         # Warm Ivory
      secondary: "#ebe5d8"
      card: "#ffffff"
      elevated: "#ffffff"
    text:
      primary: "#2a2438"         # Ink
      secondary: "#5a5468"
      muted: "#8a849a"
      accent: "#c9a96e"          # Soft Gold
    border:
      default: "#e0dbd0"
      subtle: "#ebe5d8"
      accent: "#c9a96e"
    accent:
      positive: "#c9a96e"        # Soft Gold — 吉（共通）
      negative: "#8b3a3a"        # Crimson — 凶（共通）
      health: "#5a7a6a"          # Jade — 健康（共通）

  # カラー使用ルール
  rules:
    - "金（Soft Gold）は吉・ポジティブ要素に使用"
    - "深紅（Crimson）は注意喚起に限定使用"
    - "グラデーションは最小限（インディゴ→ミッドナイトの微妙な変化のみ許容）"

# ------------------------------------------------------------
# タイポグラフィ
# ------------------------------------------------------------
typography:
  heading:
    japanese:
      family: "Noto Serif JP"
      fallback: "'Hiragino Mincho ProN', 'Yu Mincho', serif"
      weights: [500, 700]
    english:
      family: "Cormorant Garamond"
      fallback: "Georgia, 'Times New Roman', serif"
      weights: [500, 600]
    sizes:
      h1: "2.25rem"     # 36px
      h2: "1.875rem"    # 30px
      h3: "1.5rem"      # 24px
      h4: "1.25rem"     # 20px
      h5: "1.125rem"    # 18px
      h6: "1rem"        # 16px

  body:
    japanese:
      family: "Noto Sans JP"
      fallback: "'Hiragino Kaku Gothic ProN', 'Yu Gothic', sans-serif"
      weights: [400, 500]
    english:
      family: "-apple-system, system-ui, BlinkMacSystemFont"
      fallback: "sans-serif"
      weights: [400]
    sizes:
      large: "1.125rem"    # 18px
      regular: "1rem"      # 16px
      small: "0.875rem"    # 14px
      caption: "0.75rem"   # 12px

  special:
    numbers:
      variant: "tabular-nums"
      note: "font-variant-numeric: tabular-nums"
    terms:
      family: "Noto Serif JP"
      weight: 700
      note: "星名・術語の強調表示"

  # 禁止事項
  prohibited:
    - family: "Inter"
      reason: "AI slop"
    - family: "Roboto"
      reason: "AI slop"
    - family: "Arial"
      reason: "AI slop"
    - family: "丸ゴシック系"
      reason: "占いアプリっぽくなる"
    - family: "手書き風フォント"
      reason: "品格低下"

# ------------------------------------------------------------
# スペーシング
# ------------------------------------------------------------
spacing:
  unit: "8px"
  scale:
    xs: "4px"       # 0.5 unit
    sm: "8px"       # 1 unit
    md: "16px"      # 2 units
    lg: "24px"      # 3 units
    xl: "32px"      # 4 units
    2xl: "48px"     # 6 units
    3xl: "64px"     # 8 units
    4xl: "96px"     # 12 units
  rules:
    - "コンテンツ間に十分なスペースを確保。詰め込まない"
    - "セクション間は3xl(64px)以上を確保"
    - "カード内パディングはlg(24px)を基準"

# ------------------------------------------------------------
# ボーダー
# ------------------------------------------------------------
borders:
  radius:
    none: "0"
    sm: "4px"
    md: "8px"
    lg: "12px"
    xl: "16px"
    2xl: "24px"
    full: "9999px"
  width:
    thin: "1px"
    medium: "2px"
  rules:
    - "カードはmd(8px)のborder-radiusを使用"
    - "ボタンはlg(12px)を使用"
    - "アバターはfullを使用"
    - "罫線の代わりに和のモチーフ（線、点）を控えめに使用"

# ------------------------------------------------------------
# シャドウ
# ------------------------------------------------------------
shadows:
  sm: "0 1px 3px rgba(13, 11, 20, 0.12)"
  md: "0 4px 8px rgba(13, 11, 20, 0.16)"
  lg: "0 8px 16px rgba(13, 11, 20, 0.20)"
  xl: "0 16px 32px rgba(13, 11, 20, 0.24)"
  # ダークモードでは控えめに使用
  # ライトモードではsmとmdを中心に使用
  rules:
    - "過剰なドロップシャドウは禁止"
    - "ダークモードではシャドウの代わりにボーダーやelevationカラーで階層を表現"
    - "ライトモードではsm〜mdを控えめに使用"

# ------------------------------------------------------------
# コンポーネント技術スタック
# ------------------------------------------------------------
components:
  library: "shadcn/ui"
  styling: "tailwind"
  tailwind_version: "4.0+"
  animation: "motion/react"
  icons: "lucide-react"
  utility: "cn (clsx + tailwind-merge)"

# ------------------------------------------------------------
# アニメーション
# ------------------------------------------------------------
animation:
  duration:
    instant: "100ms"
    fast: "150ms"
    normal: "200ms"
    max: "200ms"
  easing:
    default: "cubic-bezier(0.4, 0, 0.2, 1)"
    enter: "cubic-bezier(0, 0, 0.2, 1)"
    exit: "cubic-bezier(0.4, 0, 1, 1)"
  properties:
    allowed:
      - "transform"
      - "opacity"
    note: "compositor props のみ使用"
  reduced_motion: true    # prefers-reduced-motion 対応必須
  # 禁止
  prohibited:
    - "回転アニメーション"
    - "キラキラ・パーティクルエフェクト"
    - "レイアウトプロパティのアニメーション（width, height, margin等）"

# ------------------------------------------------------------
# 装飾・モチーフ
# ------------------------------------------------------------
decoration:
  motifs:
    - type: "星座線"
      usage: "ダッシュボード背景に淡く配置"
      opacity: "0.03〜0.06"
    - type: "和の幾何学模様"
      usage: "セクション区切りの装飾として控えめに使用"
      opacity: "0.05〜0.10"
  icons:
    library: "lucide-react"
    style: "線の細い、ミニマルなスタイル"
  illustration:
    policy: "使用しない。写真・イラストではなく抽象的な図形とタイポグラフィで表現"
  # 禁止
  prohibited:
    - "ネオンカラー"
    - "派手なグラデーション"
    - "グロー効果"
    - "水晶玉・タロットカードのイラスト"
    - "キラキラ・パーティクル"

# ------------------------------------------------------------
# レスポンシブ
# ------------------------------------------------------------
responsive:
  mobile_first: true
  breakpoints:
    sm: "640px"
    md: "768px"
    lg: "1024px"
    xl: "1280px"
  navigation:
    mobile: "下部タブバー"
    desktop: "サイドバー"
  touch_target: "44px"

# ------------------------------------------------------------
# PWA
# ------------------------------------------------------------
pwa:
  display_mode: "standalone"
  orientation:
    mobile: "portrait"
    tablet_up: "any"
  theme_color: "#1a1432"
  background_color: "#0d0b14"
  icon_concept: "深インディゴ背景 + 金の星図モチーフ"
  splash: "ブランドカラーベース"
  status_bar: "dark"

# ------------------------------------------------------------
# 品質基準
# ------------------------------------------------------------
quality:
  lighthouse:
    performance: 90
    accessibility: 100
    best_practices: 100
    seo: 90
  core_web_vitals:
    fcp: "< 1.8s"
    lcp: "< 2.5s"
    cls: "< 0.1"
  accessibility:
    wcag_level: "AA"
    contrast_ratio: "4.5:1"
    touch_target: "44px"
    focus_management: true
    screen_reader: true
  dark_mode: true    # デフォルト

# ------------------------------------------------------------
# 禁止パターン（Anti-Patterns）
# ------------------------------------------------------------
anti_patterns:
  fonts:
    - "Inter"
    - "Roboto"
    - "Arial"
    - "丸ゴシック系"
    - "手書き風フォント"
  visuals:
    - "ネオンカラー"
    - "派手なグラデーション"
    - "過剰なドロップシャドウ"
    - "グロー効果"
    - "回転アニメーション"
    - "キラキラ・パーティクル"
    - "水晶玉・タロットカードのイラスト"
  reasons:
    - "AI slop の排除"
    - "占いアプリの安っぽさの排除"
    - "品格低下の防止"
